name: QQQ Options Bot

on:
  schedule:
    - cron: '10 21 * * 1-5'   # 4:10 PM EST (weekdays)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas openpyxl

      - name: Run script
        run: python qqq_options.py

      - name: Upload output file
        uses: actions/upload-artifact@v4
        with:
          name: qqq-options-file
          path: QQQ_All_Expirations_MID.xlsx
